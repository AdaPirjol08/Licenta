apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-premium
  labels:
    user-tier: premium
spec:
  replicas: 2
  selector:
    matchLabels:
      user-tier: premium
  template:
    metadata:
      labels:
        user-tier: premium
    spec:
      containers:
      - name: myapp
        image: adapirjol/myapp:latest
        resources:
          requests:
            cpu: "1000m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "1024Mi"
        ports:
          - containerPort: 5000
