apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-free
  labels:
    user-tier: free
spec:
  replicas: 2
  selector:
    matchLabels:
      user-tier: free
  template:
    metadata:
      labels:
        user-tier: free
    spec:
      containers:
      - name: myapp
        image: adapirjol/myapp:latest
        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        ports:
          - containerPort: 5000
